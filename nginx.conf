server {
    listen 80;
    server_name sigsa.hro.gob.gt;

    # Ruta raíz para servir los archivos de Angular
    root /usr/share/nginx/html;
    index index.html index.htm;

    # --- Sirve Angular (Frontend) ---
    # Esta regla es clave para que el enrutamiento de Angular funcione.
    # Intenta servir el archivo solicitado, si no existe, sirve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Proxy para el Backend (Node.js) ---
    # Todas las peticiones a /api/... serán redirigidas al servicio 'backend'
    location /api {
        # 'backend' es el nombre del servicio en docker-compose.yml
        # El puerto 3000 es el que expone tu app de Node.
        proxy_pass http://backend:3000; 

        # Cabeceras estándar para pasar al backend
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Opcional: Manejo de errores
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}