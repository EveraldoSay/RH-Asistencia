server {
    listen 80;
    server_name sigsa.hro.gob.gt;

    # Ruta raíz para servir los archivos de Angular
    root /usr/share/nginx/html;
    index index.html index.htm;

    # --- Sirve Angular (Frontend) ---
    # Esta regla es clave para que el enrutamiento de Angular funcione.
    # Intenta servir el archivo solicitado, si no existe, sirve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Proxy para el Backend (Node.js) ---
    # Todas las peticiones a /api/... serán redirigidas al servicio 'backend'
    location /api {
        # --- INICIO: Manejo de CORS ---
        # Si la solicitud es un pre-flight (OPTIONS), responde inmediatamente.
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' "$http_origin" always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # Para otras solicitudes, añade las cabeceras a la respuesta del backend.
        add_header 'Access-Control-Allow-Origin' "$http_origin" always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        # --- FIN: Manejo de CORS ---

        # --- AÑADIDO: Tiempos de espera extendidos ---
        # Aumentamos los timeouts para dar tiempo a operaciones largas (como la sincronización)
        proxy_connect_timeout 600;
        proxy_send_timeout    600;
        proxy_read_timeout    600;
        send_timeout          600;

        # 'backend' es el nombre del servicio en docker-compose.yml
        # El puerto 3000 es el que expone tu app de Node.
        proxy_pass http://backend:3000; 

        # Cabeceras estándar para pasar al backend
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Opcional: Manejo de errores
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}