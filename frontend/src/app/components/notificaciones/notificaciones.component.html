<div class="notificaciones-container">
  <h2>📢 Notificaciones y Alertas</h2>

  <div *ngIf="cargando" class="cargando">Cargando alertas...</div>

  <div *ngIf="!cargando && alertas.length === 0" class="vacio">
    No hay alertas registradas.
  </div>

  <div class="alerta" *ngFor="let a of alertas">
    <div class="info">
      <strong>{{ a.empleado }}</strong>
      <p>{{ a.descripcion }}</p>
      <small>{{ a.fecha_hora | date: 'short' }}</small>
    </div>
    <div class="estado" [ngClass]="{ pendiente: a.estado === 'PENDIENTE', resuelta: a.estado === 'RESUELTA' }">
      {{ a.estado }}
    </div>
    <button *ngIf="a.estado === 'PENDIENTE'" class="resolver" (click)="resolver(a.id)">Resolver</button>
  </div>
</div>
