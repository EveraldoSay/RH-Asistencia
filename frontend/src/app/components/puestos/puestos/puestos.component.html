<div class="container mt-4">
  <h2>Gestionar Puestos</h2>

  <div class="card">
    <div class="card-header">
      Crear Nuevo Puesto
    </div>
    <div class="card-body">
      <form [formGroup]="puestoForm" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre del Puesto</label>
          <input type="text" id="nombre" formControlName="nombre" class="form-control">
          <div *ngIf="puestoForm.get('nombre')?.invalid && puestoForm.get('nombre')?.touched" class="text-danger">
            El nombre es requerido.
          </div>
        </div>
        <div class="mb-3">
          <label for="descripcion" class="form-label">Descripción</label>
          <textarea id="descripcion" formControlName="descripcion" class="form-control"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" [disabled]="puestoForm.invalid">Guardar</button>
      </form>
      <div *ngIf="error" class="alert alert-danger mt-3">{{ error }}</div>
      <div *ngIf="success" class="alert alert-success mt-3">{{ success }}</div>
    </div>
  </div>

  <div class="card mt-4">
    <div class="card-header">
      Listado de Puestos
    </div>
    <div class="card-body">
      <ul class="list-group">
        <li *ngFor="let puesto of puestos" class="list-group-item d-flex justify-content-between align-items-center">
          <div>
            <h5>{{ puesto.nombre_rol }}</h5>
            <p>{{ puesto.descripcion }}</p>
          </div>
          <button class="btn btn-danger btn-sm" (click)="onDelete(puesto.id)">Eliminar</button>
        </li>
      </ul>
    </div>
  </div>
</div>
